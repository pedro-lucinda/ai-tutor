services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ai_tutor
      POSTGRES_PASSWORD: ai_tutor_pass
      POSTGRES_DB: ai_tutor
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ai_tutor -d ai_tutor"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./backend/app:/app/app
    env_file:
      - ./backend/.env
    command: >
      sh -c "uv run alembic upgrade head &&
             uv run fastapi dev app/main.py --host 0.0.0.0 --port 8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://ai_tutor:ai_tutor_pass@db:5432/ai_tutor
      TAVILY_API_KEY: ${TAVILY_API_KEY}
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: >
      sh -c "npm ci && npm run dev -- --host 0.0.0.0 --port 5173"
    environment:
      VITE_API_URL: /api
      VITE_DEV_API_PROXY_TARGET: http://backend:8000
      VITE_AUTH0_DOMAIN: ${VITE_AUTH0_DOMAIN}
      VITE_AUTH0_CLIENT_ID: ${VITE_AUTH0_CLIENT_ID}
      VITE_AUTH0_AUDIENCE: ${VITE_AUTH0_AUDIENCE}
    depends_on:
      - backend

volumes:
  postgres_data:
